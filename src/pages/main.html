<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Desapego de Roupas — plataforma para vender, trocar ou doar peças de roupa em bom estado." />
  <title>Desapego de Roupas — Início</title>

  <!-- Ícone da aba do navegador -->
  <link rel="icon" type="image/png" href="../assets/icons/logo.png" />

  <!-- Fontes (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <!-- Ícones -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <!-- CSS do site -->
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <div class="page">
    <!-- Header -->
    <header class="header" role="banner">
      <div class="header__inner">
        <div class="header__search">
          <label for="site-search" class="u-sr-only">Pesquisar</label>
          <div class="search-field">
            <i class="fa-solid fa-magnifying-glass search-field__icon" aria-hidden="true"></i>
            <input
              id="site-search"
              type="search"
              class="search-field__input"
              placeholder="Pesquisar"
            />
          </div>
        </div>

        <a href="./main.html" class="header__brand" aria-label="Desapego de Roupas - Início">
          <img
            src="../assets/icons/logo.png"
            alt=""
            class="header__brand-icon"
            aria-hidden="true"
          />
        </a>

        <nav class="header__nav" aria-label="Navegação principal">
          <a href="main.html" class="header__nav-link header__nav-link--active">Início</a>
          <a id="nav-register" href="signup.html" class="header__nav-link">Cadastrar</a>
          <a id="nav-login" href="login.html" class="header__nav-link">Entrar</a>
          <a href="cadastro-roupas.html" class="header__nav-link">Cadastrar roupa</a>
          <span id="nav-username" class="header__nav-link header__nav-link--static" hidden></span>
          <div id="user-menu" class="user-menu" hidden>
            <button
              id="nav-avatar"
              type="button"
              class="header__avatar"
              aria-label="Menu do usuário"
              aria-haspopup="true"
              aria-expanded="false"
            >
              <img id="nav-avatar-img" class="header__avatar-img" src="../assets/img/avatars/avatar-1.svg" alt="" />
              <span id="nav-seller-badge" class="header__avatar-badge" aria-label="Vendedor" hidden>
                <i class="fa-solid fa-store" aria-hidden="true"></i>
              </span>
            </button>
            <div id="user-menu-panel" class="user-menu__panel" hidden>
              <a href="profile.html" class="user-menu__item">Perfil</a>
              <a id="nav-become-seller" href="seller-signup.html" class="user-menu__item" hidden>Começar a vender</a>
              <button id="nav-logout" type="button" class="user-menu__item">Sair</button>
            </div>
          </div>
        </nav>
      </div>
    </header>
    <div class="header-stripe" aria-hidden="true"></div>

    <!-- Conteúdo -->
    <main class="page__main" role="main">
      <section class="section">
        <div class="container">
          <h1 class="u-sr-only">Desapego de Roupas</h1>

          <nav class="grid grid--4" aria-label="Categorias de roupas">
            <a href="#" class="category-card">
              <img src="../assets/icons/category-top.svg" class="category-card__icon" alt="" />
              <span class="category-card__label">Superior</span>
            </a>
            <a href="#" class="category-card">
              <img src="../assets/icons/category-bottom.svg" class="category-card__icon" alt="" />
              <span class="category-card__label">Inferior</span>
            </a>
            <a href="#" class="category-card">
              <img src="../assets/icons/category-shoes.svg" class="category-card__icon" alt="" />
              <span class="category-card__label">Calçados</span>
            </a>
            <a href="#" class="category-card">
              <img src="../assets/icons/category-accessories.svg" class="category-card__icon" alt="" />
              <span class="category-card__label">Acessórios</span>
            </a>
          </nav>

          <div class="safety-notice">
            <i class="fa-solid fa-triangle-exclamation safety-notice__icon" aria-hidden="true"></i>
            <h2 class="safety-notice__title">Encontros Presenciais</h2>
            <p class="safety-notice__text">
              Sempre marque em locais públicos e movimentados e, se possível, vá acompanhado.
            </p>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer" role="contentinfo">
      Copyright @ 2026 | Todos os direitos reservados
    </footer>
  </div>
  <script type="module" src="../assets/js/controllers/header.js"></script>
</body>
</html>
